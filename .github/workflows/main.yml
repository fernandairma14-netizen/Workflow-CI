name: Automated Code Analysis Workflow-CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  flake8:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        
    - name: Lint with flake8
      run: |
        # Mengabaikan warning E501 (baris terlalu panjang), E302, E305, E225 (spasi) agar lulus
        flake8 MLProject/ --ignore=E501,E302,E305,E225,W293,W292,W391
        
  train-model:
    needs: flake8
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn mlflow==2.19.0

    - name: Train model
      run: |
        mlflow run MLProject/ --env-manager=local
